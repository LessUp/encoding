name: Deploy Docs

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            docs
            package.json
            package-lock.json

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: vitepress

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Optional: Update benchmark data periodically
  update-benchmark-data:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ golang rustc python3
      
      - name: Build and run benchmarks
        run: |
          make build
          make bench
      
      - name: Generate benchmark JSON
        run: |
          python3 scripts/generate_benchmark_json.py || echo "Using static data"
      
      - name: Commit benchmark data
        run: |
          if [ -f docs/.vitepress/data/benchmarks.json ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add docs/.vitepress/data/benchmarks.json
            git diff --cached --quiet || (git commit -m "Update benchmark data [ci skip]" && git push)
          fi
