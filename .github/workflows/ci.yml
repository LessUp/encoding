name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build and check C++ implementations
  build-cpp:
    name: Build C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Huffman C++
        run: |
          cd huffman/cpp
          g++ -std=c++17 -O2 -Wall -Wextra main.cpp -o huffman_cpp
          ./huffman_cpp || true  # Show usage

      - name: Build Arithmetic C++
        run: |
          cd arithmetic/cpp
          g++ -std=c++17 -O2 -Wall -Wextra main.cpp -o arithmetic_cpp
          ./arithmetic_cpp || true

      - name: Build Range coder C++
        run: |
          cd range/cpp
          g++ -std=c++17 -O2 -Wall -Wextra main.cpp -o rangecoder_cpp
          ./rangecoder_cpp || true

      - name: Build RLE C++
        run: |
          cd Run-Length/cpp
          g++ -std=c++17 -O2 -Wall -Wextra main.cpp -o rle_cpp
          ./rle_cpp || true

  # Build and check Go implementations
  build-go:
    name: Build Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Check Go formatting
        run: |
          # Check if any files need formatting
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Please run 'gofmt -w .' to format them."
            exit 1
          fi

      - name: Build Huffman Go
        run: |
          cd huffman/go
          go vet ./...
          go test ./...
          go build -o huffman_go .

      - name: Build Range coder Go
        run: |
          cd range/go
          go vet ./...
          go build ./...

      - name: Build RLE Go
        run: |
          cd Run-Length/go
          go vet ./...
          go test ./...
          go build -o rle_go .

  # Build and check Rust implementations
  build-rust:
    name: Build Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check Rust formatting
        run: |
          # Check formatting for standalone Rust files
          for file in huffman/rust/main.rs Run-Length/rust/main.rs; do
            if [ -f "$file" ]; then
              rustfmt --check "$file" || exit 1
            fi
          done
          # Check formatting for Cargo projects
          if [ -f "range/rust/Cargo.toml" ]; then
            cd range/rust && cargo fmt --check
          fi

      - name: Build Huffman Rust
        run: |
          cd huffman/rust
          rustc -O main.rs -o huffman_rust
          rustc --test main.rs -o huffman_rust_test
          ./huffman_rust_test

      - name: Build and check Range coder Rust
        run: |
          cd range/rust
          cargo clippy -- -D warnings
          cargo test
          cargo build --release

      - name: Build RLE Rust
        run: |
          cd Run-Length/rust
          rustc -O main.rs -o rle_rust
          rustc --test main.rs -o rle_rust_test
          ./rle_rust_test

  # Verify encode/decode correctness
  test-correctness:
    name: Test Correctness
    runs-on: ubuntu-latest
    needs: [build-cpp, build-go, build-rust]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate test data
        run: python3 tests/gen_testdata.py

      - name: Build all implementations
        run: |
          # C++
          cd huffman/cpp && g++ -std=c++17 -O2 main.cpp -o huffman_cpp && cd ../..
          cd arithmetic/cpp && g++ -std=c++17 -O2 main.cpp -o arithmetic_cpp && cd ../..
          cd range/cpp && g++ -std=c++17 -O2 main.cpp -o rangecoder_cpp && cd ../..
          cd Run-Length/cpp && g++ -std=c++17 -O2 main.cpp -o rle_cpp && cd ../..
          
          # Go
          cd huffman/go && go build -o huffman_go . && cd ../..
          cd Run-Length/go && go build -o rle_go . && cd ../..
          
          # Rust
          cd huffman/rust && rustc -O main.rs -o huffman_rust && cd ../..
          cd Run-Length/rust && rustc -O main.rs -o rle_rust && cd ../..

      - name: Test Huffman correctness
        run: |
          TEST_FILE="tests/data/random_1MiB.bin"
          
          echo "Testing Huffman C++..."
          ./huffman/cpp/huffman_cpp encode "$TEST_FILE" /tmp/huf_cpp.enc
          ./huffman/cpp/huffman_cpp decode /tmp/huf_cpp.enc /tmp/huf_cpp.dec
          diff "$TEST_FILE" /tmp/huf_cpp.dec
          
          echo "Testing Huffman Go..."
          ./huffman/go/huffman_go encode "$TEST_FILE" /tmp/huf_go.enc
          ./huffman/go/huffman_go decode /tmp/huf_go.enc /tmp/huf_go.dec
          diff "$TEST_FILE" /tmp/huf_go.dec
          
          echo "Testing Huffman Rust..."
          ./huffman/rust/huffman_rust encode "$TEST_FILE" /tmp/huf_rust.enc
          ./huffman/rust/huffman_rust decode /tmp/huf_rust.enc /tmp/huf_rust.dec
          diff "$TEST_FILE" /tmp/huf_rust.dec
          
          echo "Testing cross-language compatibility (C++ encode -> Go decode)..."
          ./huffman/go/huffman_go decode /tmp/huf_cpp.enc /tmp/huf_cross.dec
          diff "$TEST_FILE" /tmp/huf_cross.dec
          
          echo "Huffman tests passed!"

      - name: Test RLE correctness
        run: |
          TEST_FILE="tests/data/repetitive_10MiB.bin"
          
          echo "Testing RLE C++..."
          ./Run-Length/cpp/rle_cpp encode "$TEST_FILE" /tmp/rle_cpp.enc
          ./Run-Length/cpp/rle_cpp decode /tmp/rle_cpp.enc /tmp/rle_cpp.dec
          diff "$TEST_FILE" /tmp/rle_cpp.dec
          
          echo "Testing RLE Go..."
          ./Run-Length/go/rle_go encode "$TEST_FILE" /tmp/rle_go.enc
          ./Run-Length/go/rle_go decode /tmp/rle_go.enc /tmp/rle_go.dec
          diff "$TEST_FILE" /tmp/rle_go.dec
          
          echo "Testing RLE Rust..."
          ./Run-Length/rust/rle_rust encode "$TEST_FILE" /tmp/rle_rust.enc
          ./Run-Length/rust/rle_rust decode /tmp/rle_rust.enc /tmp/rle_rust.dec
          diff "$TEST_FILE" /tmp/rle_rust.dec
          
          echo "Testing cross-language compatibility (C++ encode -> Rust decode)..."
          ./Run-Length/rust/rle_rust decode /tmp/rle_cpp.enc /tmp/rle_cross.dec
          diff "$TEST_FILE" /tmp/rle_cross.dec
          
          echo "RLE tests passed!"

      - name: Test Arithmetic coding correctness
        run: |
          TEST_FILE="tests/data/random_1MiB.bin"
          
          echo "Testing Arithmetic C++..."
          ./arithmetic/cpp/arithmetic_cpp encode "$TEST_FILE" /tmp/arith.enc
          ./arithmetic/cpp/arithmetic_cpp decode /tmp/arith.enc /tmp/arith.dec
          diff "$TEST_FILE" /tmp/arith.dec
          
          echo "Arithmetic tests passed!"

      - name: Test Range coder C++ correctness
        run: |
          TEST_FILE="tests/data/random_1MiB.bin"
          
          echo "Testing Range coder C++..."
          ./range/cpp/rangecoder_cpp encode "$TEST_FILE" /tmp/range_cpp.enc
          ./range/cpp/rangecoder_cpp decode /tmp/range_cpp.enc /tmp/range_cpp.dec
          diff "$TEST_FILE" /tmp/range_cpp.dec
          
          echo "Range coder C++ tests passed!"

  # Run Go tests for Range coder
  test-range-go:
    name: Test Range coder Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Range coder Go tests
        run: |
          cd range/go
          go test -v ./...

  # Check required files exist
  check-files:
    name: Check Required Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          required_files=(
            "LICENSE"
            "README.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "CHANGELOG.md"
            "SECURITY.md"
            ".github/workflows/ci.yml"
            ".github/ISSUE_TEMPLATE/bug_report.md"
            ".github/ISSUE_TEMPLATE/feature_request.md"
            ".github/PULL_REQUEST_TEMPLATE.md"
          )
          
          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              missing=1
            else
              echo "✅ Found: $file"
            fi
          done
          
          if [ $missing -eq 1 ]; then
            echo ""
            echo "Some required files are missing!"
            exit 1
          fi
          
          echo ""
          echo "All required files present!"
